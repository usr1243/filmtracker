<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1117"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="12%" r="60%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#3dd68c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="80" y="150" font-family="DM Sans, Arial, sans-serif" font-size="34" font-weight="600" fill="#9aa3b2">🎬  Filmtracker</text>
  <text x="80" y="300" font-family="DM Sans, Arial, sans-serif" font-size="88" font-weight="700" fill="#f2f4f8" letter-spacing="-3">Alle deine Filme.</text>
  <text x="80" y="400" font-family="DM Sans, Arial, sans-serif" font-size="88" font-weight="700" fill="url(#grad)" letter-spacing="-3">Immer griffbereit.</text>
  <text x="80" y="480" font-family="DM Sans, Arial, sans-serif" font-size="30" font-weight="400" fill="#9aa3b2">Tracken · Bewerten · Filtern · Finden — kostenlos, auf jedem Gerät</text>
  <g transform="translate(80,540)">
    <circle cx="12" cy="12" r="12" fill="#fb5a6a"/>
    <circle cx="52" cy="12" r="12" fill="#3dd68c"/>
    <circle cx="92" cy="12" r="12" fill="#f0a92b"/>
    <circle cx="132" cy="12" r="12" fill="#5aa2ff"/>
    <text x="164" y="20" font-family="DM Sans, Arial, sans-serif" font-size="24" font-weight="500" fill="#6b7280">640 Filme · deine persönliche Filmbibliothek</text>
  </g>
